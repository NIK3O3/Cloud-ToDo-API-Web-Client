services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    environment:
      ENV: local
      API_KEY: dev-api-key
      DATABASE_URL: postgresql+psycopg://todo:todo@postgres:5432/todo
      CORS_ORIGINS: http://localhost:8080,http://localhost:8000
      LOG_LEVEL: INFO
      RUN_MIGRATIONS: "true"
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
